name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AroniumBridge.sln

    - name: Build
      run: dotnet build AroniumBridge.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish AroniumBridge.csproj -c Release -r win-x64 --self-contained false -o ./publish

    - name: Zip Artifact
      run: Compress-Archive -Path ./publish/* -DestinationPath AroniumBridge.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AroniumBridge-Build
        path: AroniumBridge.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: AroniumBridge.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
